name: Dashboard push notifications

on:
  # ⏸ ВРЕМЕННО ОТКЛЮЧЕНО: расписание закомментировано, чтобы не будить БД каждые 5 минут.
  # Чтобы снова включить пуш-уведомления — раскомментируйте блок schedule ниже и запушьте.
  # schedule:
  #   - cron: '*/5 * * * *' # каждые 5 минут (GitHub может задержать под нагрузкой до 15 мин)
  workflow_dispatch:

concurrency:
  group: dashboard-push
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call /api/cron/dashboard-push
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL or CRON_SECRET secret is missing"
            exit 1
          fi
          response=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/dashboard-push" || echo "000")
          echo "HTTP $response"
          cat /tmp/body || true
          # Не валим job на нештатном ответе — Vercel может холодно стартовать,
          # хочется чтобы GH не плодил красные галки на каждый редкий 5xx.
          if [ "$response" != "200" ]; then
            echo "Non-200 response, but exiting 0 to avoid noisy failures"
          fi
